<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, rgb(176, 176, 176), rgb(52, 69, 139));
        }
        .box {
            padding: 30px;
            text-align: center;
        }
        .inbox {
            border-radius: 10px;
            padding: 20px;
            margin: 10px;
        }
        input {
            display: block;
            margin: 15px auto;
            padding: 8px;
            width: 200px;
        }
        .login {
            width: 120px;
            height: 40px;
            border-radius: 20px;
        }
        .login:hover {
            cursor: pointer;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .row a {
            text-decoration: none;
        }
    </style>
</head>

<body onload="generateCaptcha()">
    <div class="box">
        <h2>Login</h2>

        <div class="inbox">
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">

            <!-- CAPTCHA -->
            <p id="captchaText"></p>
            <input type="number" id="captchaInput" placeholder="Enter captcha sum">
        </div>

        <button class="login" onclick="validateCaptcha()">Login</button>

        <div class="row">
            <a href="">Sign Up</a>
            <a href="">Forgot Password?</a>
        </div>
    </div>

    <script>
        let num1, num2;

        function generateCaptcha() {
            num1 = Math.floor(Math.random() * 9) + 1;
            num2 = Math.floor(Math.random() * 9) + 1;
            document.getElementById("captchaText").innerText =
                "Captcha: " + num1 + " + " + num2 + " = ?";
        }

        function validateCaptcha() {
            let userSum = document.getElementById("captchaInput").value;

            if (userSum == (num1 + num2)) {
                alert("Login successful!");
                // proceed with login logic here
            } else {
                alert("Incorrect captcha. Try again.");
                document.getElementById("captchaInput").value = "";
                generateCaptcha();
            }
        }
    </script>
</body>
</html>
