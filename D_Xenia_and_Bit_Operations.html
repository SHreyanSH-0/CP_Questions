<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Feedback Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #807878;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #000000;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        .radio-group {
            display: flex;
            gap: 15px;
        }

        button {
            background-color: #04ff00;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background-color: #00ff0d;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Faculty Feedback Form</h2>

    <form action="#" method="get">

        <div class="form-group">
            <label for="studentName">Student Name</label>
            <input type="text" id="studentName" name="studentName" 
                   pattern="[A-Za-z\s]+" 
                   title="Please enter letters and spaces only"
                   required>
        </div>

        <div class="form-group">
            <label for="email">Student Email</label>
            <input type="email" id="email" name="email" required pattern="[A-Za-z\s]+@nitkkr.ac.in" >
        </div>

        <div class="form-group">
            <label for="faculty">Faculty Name</label>
            <select id="faculty" name="faculty" required>
                <option value="">-- Select Faculty --</option>
                <option value="Dr. Shweta Sharma">Dr. Shweta Sharma</option>
                <option value="Prof. Chabra">Prof. Chabra</option>
                <option value="Dr. Vijay Verma">Dr. Vijay Verma</option>
                <option value="Prof. Mayank Dave">Prof. Mayank Dave</option>
            </select>
        </div>

        <div class="form-group">
            <label>Rating</label>
            <div class="radio-group">
                <label><input type="radio" name="rating" value="Excellent" required> Excellent</label>
                <label><input type="radio" name="rating" value="Good"> Good</label>
                <label><input type="radio" name="rating" value="Average"> Average</label>
                <label><input type="radio" name="rating" value="Poor"> Poor</label>
            </div>
        </div>

        <div class="form-group">
            <label for="positive">Positive Aspects</label>
            <textarea id="positive" name="positive" rows="4" minlength="10" required></textarea>
        </div>

        <div class="form-group">
            <label for="improvement">Areas for Improvement</label>
            <textarea id="improvement" name="improvement" rows="4" minlength="10" required></textarea>
        </div>

        <button type="submit">Submit Feedback</button>

    </form>
</div>

</body>
</html>
